---
# pfSense service rules
- name: pfsense_service | Add service rules for {{ service.key }}
  pfsensible.core.pfsense_rule:
    name: 'Allow inbound port range'
    action: pass
    interface: wan
    ipprotocol: inet
    protocol: tcp
    source: any
    destination: ["{{ item.value.ip |  default(fw_net ~ item.key) }}"]
    destination_port: {{ item.value.port }}
    after: 'Anti-Lockout Rule'
    state: present



    provider: "{{ provider }}"
    rule_name: "inbound-{{ service.key }}{{ item.key }}"
    source_zone: [wan]
    source_ip: [any]
    destination_zone: ["{{ item.value | default('lan') }}"]
    destination_ip: ["{{ item.value.ip |  default(fw_net ~ item.key) }}"]
    application: "{{ palo_svc[service.key] }}"
    action: allow
    location: before
    existing_rule: inbound-all
    group_profile: security
    log_start: true
    log_end: true
    log_setting: "Loggie McLog Face"
    tag_name: [Service]
  loop: "{{ service.value | dict2items }}"
